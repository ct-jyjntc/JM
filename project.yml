name: JMBoomMac
options:
  bundleIdPrefix: com.luna
  deploymentTarget:
    macOS: "15.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
targets:
  JMBoomMac:
    type: application
    platform: macOS
    sources:
      - path: JMBoomMac
        excludes:
          - Resources/Info.plist
          - Resources/JMBoomMac.entitlements
    resources:
      - path: JMBoomMac/Resources
        excludes:
          - Info.plist
          - JMBoomMac.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.luna.JMBoomMac
        PRODUCT_NAME: JM
        INFOPLIST_FILE: JMBoomMac/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: JMBoomMac/Resources/JMBoomMac.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_USER_SCRIPT_SANDBOXING: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        DEAD_CODE_STRIPPING: "YES"
